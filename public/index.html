<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JunkEngine Studio</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        #canvas {
            border: 2px solid #333;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .info {
            color: #666;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Application</h1>
    <canvas id="canvas" width="800" height="600"></canvas>
    <div class="info">
        <p>W A S D to move camera · Click to enable mouse look (inverted Y-axis) · Shift to go down and Space to go up</p>
    </div>
</div>
</body>
</html>
